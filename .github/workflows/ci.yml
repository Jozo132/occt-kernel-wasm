name: Validation

run-name: Validation / ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}

concurrency:
  group: validation-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master, 'copilot/**']
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript: lint, build, test
  # ---------------------------------------------------------------------------
  typescript:
    name: TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ---------------------------------------------------------------------------
  # C++ static analysis (clang-tidy / clang-format check)
  # Runs without OCCT installed – only checks formatting and obvious issues.
  # ---------------------------------------------------------------------------
  cpp-lint:
    name: C++ lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-format clang-tidy

      - name: Check C++ formatting
        run: |
          find cpp/ bindings/ -name '*.cpp' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror --style=file 2>&1 || \
            echo "::warning::clang-format found style differences (non-blocking)"

  # ---------------------------------------------------------------------------
  # WASM build (only on ubuntu-latest, requires Emscripten + OCCT)
  # This job is skipped if OCCT is not cached; it acts as a build smoke test
  # when the full dependency cache is warm.
  # ---------------------------------------------------------------------------
  wasm-build:
    name: WASM build (Emscripten)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only attempt the WASM build on pushes to main/master, not every PR,
    # to avoid consuming large amounts of CI time before OCCT is cached.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Emscripten
        id: cache-emsdk
        uses: actions/cache@v4
        with:
          path: ~/emsdk
          key: emsdk-3.1.59

      - name: Install Emscripten
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git ~/emsdk
          ~/emsdk/emsdk install 3.1.59
          ~/emsdk/emsdk activate 3.1.59

      - name: Cache OCCT WASM build
        id: cache-occt-wasm
        uses: actions/cache@v4
        with:
          path: third-party/occt-wasm
          key: occt-wasm-7.8.1-emsdk-3.1.59-${{ runner.os }}

      - name: Build OCCT for WASM
        if: steps.cache-occt-wasm.outputs.cache-hit != 'true'
        run: |
          source ~/emsdk/emsdk_env.sh
          bash scripts/build-occt.sh

      - name: Build WASM module
        run: |
          source ~/emsdk/emsdk_env.sh
          bash scripts/build-wasm.sh release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: occt-kernel-wasm-dist
          path: dist/
          retention-days: 14
